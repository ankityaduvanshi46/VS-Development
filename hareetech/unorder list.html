<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--Ordered list-->
    
    <ul>
        <li>DOG</li>
        <li>CAT</li>
        <li>COW</li>
        <li>FROG</li>
        <li>FISH</li>
    </ul>
        <hr>
    <!-- li*5--        
         <li></li>
        <li></li>
        <li></li>
        <li></li>
        <li></li>
        -->
        <h1>Desk</h1><hr>
        <ul type="A">
        <li>DOG</li>
        <li>CAT</li>
        <li>COW</li>
        <li>FROG</li>
        <li>FISH</li>
        </ul>
        <hr>
        <h1>Circle</h1><hr>
        <ul type="Circle">
        <li>DOG</li>
        <li>CAT</li>
        <li>COW</li>
        <li>FROG</li>
        <li>FISH</li>
        </ul>
        <hr>
        <h1>square</h1><hr>
        <ul type="square">
        <li>DOG</li>
        <li>CAT</li>
        <li>COW</li>
        <li>FROG</li>
        <li>FISH</li>
        </ul>
        <hr>
        <ol type="i"><hr>
        <li>DOG</li>
        <li>CAT</li>
        <li>COW</li>
        <li>FROG</li>
        <li>FISH</li>
        </ul>
        <hr>


</body>
</html>
