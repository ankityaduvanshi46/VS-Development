<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <div class="container">
      <form class="card-body shadow p-5 mt-5" action="">
        <h1
          class="text-center text-primary fw-bold border border-2 border-primary rounded-5 py-3"
        >
          Registration Form
        </h1>
        <div class="row mb-3">
          <div class="col-lg-6">
            <label class="form-label">First Name</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter First Name"
            />
          </div>

          <div class="col-lg-6 col-sm-4">
            <label class="form-label">Last Name</label>
            <input
              type="text"
              class="form-control"
              placeholder="Enter Last Name"
            />
          </div>
        </div>
        <div class="row">
          <div class="col-lg-4">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              placeholder="Enter First Name"
            />
          </div>
          <div class="col-lg-4">
            <label class="form-label">Age</label>
            <input
              type="number"
              min="0"
              max="130"
              class="form-control"
              placeholder="Enter First Name"
            />
          </div>
          <div class="col-lg-4">
            <label class="form-label">DOB</label>

            <input
              type="date"
              class="form-control"
              placeholder="Enter First Name"
            />
          </div>
        </div>
        <div class="row">
          <div class="col-lg-4">
            <label class="form-label">Time</label>
            <input type="time" class="form-control" />
          </div>
          <div class="col-lg-4">
            <label class="form-label">Password</label>
            <input
              type="password"
              class="form-control"
              placeholder="Enter your password"
            />
          </div>
          <div class="col-lg-4">
            <label class="form-label">Phone No</label>
            <input
              type="tel"
              class="form-control"
              placeholder="Enter your phone no"
            />
          </div>
        </div>

        <div class="row">
          <div class="col-lg-6">
            <label class="form-label">Resume</label>

            <input
              type="file"
              class="form-control"
              placeholder="Enter First Name"
              accept=".pdf, .png, .jpg, .jpeg"
              multiple
            />
          </div>

          <div class="col-lg-6">
            <label class="form-label">City</label>

            <select class="form-select">
              <option selected>Select City</option>
              <option value="lk">Lucknow</option>
              <option value="">Delhi</option>
              <option>Mumbai</option>
              <option>Pune</option>
            </select>
          </div>
        </div>

        <div class="row my-3">
            <div class="col-lg-6">
          <label class="form-label">Gender</label> <br>

          <input class="form-check-input" type="radio" id="male" name="gender" />
          <label class="form-check-label " for="male">Male</label>


          <input class="form-check-input" id="female" type="radio" name="gender" />
          <label class="form-check-label" for="female">Female</label>

               <input class="form-check-input" id="other" type="radio" name="gender" />
          <label class="form-check-label" for="other">Other </label>
          </div>

          <div class="col-lg-6">
               <label class="form-label d-block">Skills</label>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" id="first" type="checkbox">
                            <label class="form-check-label" for="first">HTML</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label">CSS</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox">
                            <label class="form-check-label">Bootstrap</label>
                        </div>
          </div>
        </div>

        <div class="row">
            <div class="col-lg-6">
                <label class="form-label">URL</label>
                <input type="url"  class="form-control">
            </div>
            <div class="col-lg-6">
                <label class="form-label">Range</label>
                <input type="range"  class="form-range">
            </div>
        </div>

        <div class="row">
            <div class="col-lg-12">
                <label for="" class="form-label"></label>
                <textarea row="30" col="10" class="form-control"></textarea>
            </div>
        </div>

        <div class="row mt-3">
          <div class="col-lg-4"></div>
          <div class="col-lg-1">
            <button class="btn btn-primary" type="submit">Submmit</button>
          </div>
          <div class="col-lg-3">
            <button class="btn btn-danger" type="Reset">Reset</button>
          </div>
        </div>
      </form>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
