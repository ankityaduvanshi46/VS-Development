<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .main  {
            border: 2px solid black;
            height: 913px;
            width: 100%;
            display:flex;
            flex-direction: row;
            align-items: top;
            justify-content: space-evenly;
            flex-wrap: wrap;
        }

        .inner {
            background-color: rgb(244, 77, 44);
            height: 100px;
            width: 140px;
            margin: 5px;
        }
        #first {
            background-color: rgb(243, 122, 221);
        }
        #second {
            background-color: rgb(130, 207, 232);
        }
        #third {
            background-color: rgb(103, 234, 103);
        }
        #fourth {
            background-color: rgb(234, 158, 7);
        }
        #fifth {
            background-color: rgb(33, 112, 112);
        }
        p{
            color: rgb(0, 0, 0);
            font-size: 20px;
            font-weight: 900;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
    </style>
</head>
<body>
    <div class="main">
        <div class="inner"><p>Red</p></div>
        <div class="inner" id="second"><p>Blue</p></div>
        <div class="inner" id="third"><p>Green</p></div>
        <div class="inner" id="first"><p>Pink</p></div>
        <div class="inner" id="fourth"><p>fourth</p></div>
        <div class="inner" id="fifth"><p>fifth</p></div>
        <div class="inner" id="third"><p>Green</p></div>
        <div class="inner" id="first"><p>Pink</p></div>
    </div>
</body>
</html>
