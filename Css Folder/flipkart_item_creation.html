<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .main-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            height: auto;
        }
        .product-cart {
            width: 250px;
            height: 400px;
            background-color: rgb(243, 238, 238);
        }
        .img-div {
            width: 100%;
            height: 60%;
        }
        .img-div img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="product-cart">
            <div class="img-div">
                <img src="https://images.unsplash.com/photo-1617864064479-f203fc7897c0?q=80&w=1287&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"/>
            </div>
            <div class="detail-section">
                <p>Product Name:- PS5</p>
                <p>Product Price</p>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <p style="font-size: 20px;font-weight: 600;">10,000$</p>
                    <p>50% off🙀</p>
                    <p><strike>20,000$💁🏻</strike></p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
