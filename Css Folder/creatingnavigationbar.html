<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <style>
        .main  {
            border: 2px solid black;
            height: 913px;
            width: 100%;
            display:flex;
            flex-direction: row;
            align-items: flex-start;
        }
        li{
            padding-top: 20px;
            padding-left: 20px;
            padding-bottom: 20px;
            list-style: none;
            color: rgb(0, 0, 0);
        }
        ul{
            display: flex;
            color: rgb(243, 122, 221);
            background-color: rgb(234, 158, 7);
            width: 100%;
            margin: center;
        }
        

        .inner {
            background-color: rgb(243, 157, 53);
            height: 100px;
            width: 100%;
            margin: 5px;
            flex-direction: column;
        }
        #first {
            background-color: rgb(243, 122, 221);
        }
        #second {
            background-color: rgb(130, 207, 232);
        }
        #third {
            background-color: rgb(103, 234, 103);
        }
        #fourth {
            background-color: rgb(234, 158, 7);
        }
        #fifth {
            background-color: rgb(33, 112, 112);
        }
        p{
            color: rgb(0, 0, 0);
            font-size: 20px;
            font-weight: 900;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }
    </style>
</head>
<body>
    <div class="main">   
    <nav>
        <ul>
            <li> About </li>
            <li> Home </li>
            <li> contact </li>
            <li> Exit </li>
        </ul>
    </nav>
    </div>
</body>
</html>
